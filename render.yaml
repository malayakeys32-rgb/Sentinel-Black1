services:
  # ── BACKEND (Node/Express) ─────────────────────────────────────
  - type: web
    name: sentinel-black-backend
    runtime: node
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure secret
      - key: PORT
        value: 4000

  # ── FRONTEND (Static Site via Vite) ───────────────────────────
  - type: web
    name: sentinel-black-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Replace with your backend Render URL after first deploy
        value: https://sentinel-black-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
